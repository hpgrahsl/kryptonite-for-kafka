name: Docs Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build docs from (e.g. v0.6.0)'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5

      - uses: actions/checkout@v4
        # Keeps scripts (.github/scripts/) from the workflow branch intact

      - name: Checkout docs source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          path: _build-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Zensical
        run: pip install zensical mkdocs-glightbox

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # v0.7.0 -> v0.7, v0.7 -> v0.7
          VERSION=$(echo "$TAG" | grep -oP '^v\d+\.\d+')
          if [ -z "$VERSION" ]; then
            echo "Could not extract minor version from tag: $TAG" >&2
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build release site
        run: cd _build-src && zensical build --clean

      - name: Inject current version picker assets
        run: |
          python3 - <<'EOF'
          import pathlib

          site = pathlib.Path('_build-src/site')

          # Overwrite extra.css — already referenced by all versions
          pathlib.Path(site / 'assets/stylesheets/extra.css').write_text(
              pathlib.Path('docs/assets/stylesheets/extra.css').read_text()
          )

          # Inline picker JS before </body> — avoids relative-path issues
          # for tags that predate extra_javascript: version-picker.js
          script_tag = '<script>' + pathlib.Path('docs/assets/javascripts/version-picker.js').read_text() + '</script>'
          for html in site.rglob('*.html'):
              content = html.read_text()
              if 'k4k-version-picker' not in content:
                  html.write_text(content.replace('</body>', script_tag + '\n</body>', 1))
          EOF

      - name: Checkout docs-archive
        uses: actions/checkout@v4
        with:
          ref: docs-archive
          path: docs-archive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add release version to archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          rm -rf "docs-archive/$VERSION"
          mkdir -p "docs-archive/$VERSION"
          cp -r _build-src/site/. "docs-archive/$VERSION/"
          python3 .github/scripts/update-versions.py \
            docs-archive/versions.json "$VERSION" latest --max-releases 3

      - name: Regenerate root redirect
        run: |
          python3 .github/scripts/make-root-redirect.py \
            docs-archive/versions.json \
            https://hpgrahsl.github.io/kryptonite-for-kafka/ \
            > docs-archive/index.html

      - name: Commit and push to docs-archive
        run: |
          cd docs-archive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "docs: add release ${{ steps.version.outputs.version }}"
          git push

      - name: Assemble full site artifact
        run: |
          mkdir -p full-site
          cp docs-archive/index.html full-site/
          cp docs-archive/versions.json full-site/
          find docs-archive -maxdepth 1 -mindepth 1 -type d ! -name '.git' | while read d; do
            name=$(basename "$d")
            cp -r "$d" "full-site/$name"
          done

      - uses: actions/upload-pages-artifact@v4
        with:
          path: full-site

      - uses: actions/deploy-pages@v4
        id: deployment

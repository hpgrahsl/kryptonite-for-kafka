name: Docs Snapshot

on:
  push:
    branches: [ master ]
    paths:
      - 'mkdocs.yml'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Zensical
        run: pip install zensical mkdocs-glightbox

      - name: Build dev site
        run: zensical build --clean

      - name: Checkout docs-archive
        uses: actions/checkout@v4
        with:
          ref: docs-archive
          path: docs-archive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update dev version in archive
        run: |
          rm -rf docs-archive/dev docs-archive/latest
          mkdir -p docs-archive/dev
          cp -r site/. docs-archive/dev/
          python3 .github/scripts/update-versions.py \
            docs-archive/versions.json dev

      - name: Regenerate root redirect
        run: |
          python3 .github/scripts/make-root-redirect.py \
            docs-archive/versions.json \
            https://hpgrahsl.github.io/kryptonite-for-kafka/ \
            > docs-archive/index.html

      - name: Commit and push to docs-archive
        run: |
          cd docs-archive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "docs: update dev version"
          git push

      - name: Assemble full site artifact
        run: |
          mkdir -p full-site
          cp docs-archive/index.html full-site/
          cp docs-archive/versions.json full-site/
          find docs-archive -maxdepth 1 -mindepth 1 -type d ! -name '.git' | while read d; do
            name=$(basename "$d")
            cp -r "$d" "full-site/$name"
          done

      - uses: actions/upload-pages-artifact@v4
        with:
          path: full-site

      - uses: actions/deploy-pages@v4
        id: deployment
